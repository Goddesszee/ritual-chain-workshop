<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NAN Bounty Judge — Privacy-Preserving AI Bounty System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js">
// ── QUIZ ARENA ─────────────────────────────────────────────────────────────
// Simple localStorage-based room system (works without a backend)
let quizRole = null;
let roomCode = null;
let roomData = null;
let hostInterval = null;
let playerInterval = null;
let playerTimerInterval = null;
let playerName = "";
let playerScore = 0;
let currentQIndex = 0;
let hasAnswered = false;
let timerSeconds = 30;

function getRoomKey(code) { return "quizRoom_" + code.toUpperCase(); }
function saveRoom(data) { localStorage.setItem(getRoomKey(data.code), JSON.stringify(data)); }
function loadRoom(code) { return JSON.parse(localStorage.getItem(getRoomKey(code)) || "null"); }

function selectRole(role) {
  quizRole = role;
  document.getElementById("quizRoleSelector").style.display = role ? "none" : "";
  document.getElementById("hostPanel").style.display = role === "host" ? "" : "none";
  document.getElementById("playerPanel").style.display = role === "player" ? "" : "none";
  if (role === "host") {
    document.getElementById("hostSetupCard").style.display = "";
    document.getElementById("hostQuestionsCard").style.display = "none";
    document.getElementById("hostControlsCard").style.display = "none";
  }
  if (role === "player") {
    document.getElementById("playerJoinCard").style.display = "";
    document.getElementById("playerWaitCard").style.display = "none";
    document.getElementById("playerAnswerCard").style.display = "none";
    document.getElementById("playerScoreCard").style.display = "none";
  }
}

// ── HOST ──────────────────────────────────────────────────────────────────
function generateCode() {
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

function createQuizRoom() {
  const title = document.getElementById("hTitle").value.trim();
  const category = document.getElementById("hCategory").value;
  const timer = parseInt(document.getElementById("hTimer").value) || 30;
  const context = document.getElementById("hContext").value.trim();
  if (!title) { alert("Enter a quiz title!"); return; }

  roomCode = generateCode();
  roomData = {
    code: roomCode, title, category, timer, context,
    questions: [], players: {}, answers: {},
    state: "lobby", // lobby | question | scoring | finished
    currentQ: -1, createdAt: Date.now()
  };
  saveRoom(roomData);

  document.getElementById("displayRoomCode").textContent = roomCode;
  document.getElementById("hostSetupCard").style.display = "none";
  document.getElementById("hostQuestionsCard").style.display = "";
  document.getElementById("hostControlsCard").style.display = "";
  renderQuestions();

  // Poll for players joining
  hostInterval = setInterval(() => {
    roomData = loadRoom(roomCode);
    if (!roomData) return;
    const count = Object.keys(roomData.players).length;
    document.getElementById("playerCountBadge").textContent = count + " player" + (count !== 1 ? "s" : "");
    if (roomData.state === "scoring") {
      document.getElementById("answerCount").textContent = Object.keys(roomData.answers).length;
      renderLiveAnswers();
    }
  }, 1500);

  document.getElementById("hostSetupStatus").innerHTML =
    '<div class="status status-success">Room created! Share code <strong>' + roomCode + '</strong> with players.</div>';
}

function addQuestion() {
  const q = document.getElementById("newQ").value.trim();
  const a = document.getElementById("newA").value.trim();
  if (!q) { alert("Enter a question!"); return; }
  roomData.questions.push({ q, modelAnswer: a, scores: {} });
  saveRoom(roomData);
  document.getElementById("newQ").value = "";
  document.getElementById("newA").value = "";
  renderQuestions();
}

function renderQuestions() {
  const el = document.getElementById("questionsList");
  if (!roomData.questions.length) {
    el.innerHTML = '<p style="color:var(--muted);font-size:13px">No questions yet. Add some below!</p>';
    return;
  }
  el.innerHTML = roomData.questions.map((q,i) => `
    <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;font-weight:600">${i+1}. ${q.q}</div>
        ${q.modelAnswer ? '<div style="font-size:11px;color:var(--muted)">Model: ' + q.modelAnswer.slice(0,50) + '...</div>' : ''}
      </div>
      <button onclick="removeQuestion(${i})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px">×</button>
    </div>
  `).join('');
}

function removeQuestion(i) {
  roomData.questions.splice(i, 1);
  saveRoom(roomData);
  renderQuestions();
}

function startRound() {
  roomData = loadRoom(roomCode);
  if (!roomData.questions.length) { alert("Add at least one question first!"); return; }
  currentQIndex = roomData.currentQ + 1;
  if (currentQIndex >= roomData.questions.length) { alert("No more questions!"); return; }
  roomData.currentQ = currentQIndex;
  roomData.state = "question";
  roomData.answers = {};
  roomData.questionStarted = Date.now();
  saveRoom(roomData);
  const q = roomData.questions[currentQIndex];
  document.getElementById("hostCurrentQ").textContent = (currentQIndex + 1) + ". " + q.q;
  document.getElementById("hostGameStatus").textContent = "Question " + (currentQIndex+1) + " of " + roomData.questions.length + " — players answering...";
  document.getElementById("startRoundBtn").style.display = "none";
  document.getElementById("showScoresBtn").style.display = "";
  document.getElementById("hostScoreDisplay").style.display = "none";
  document.getElementById("liveAnswers").innerHTML = "";
}

function renderLiveAnswers() {
  const el = document.getElementById("liveAnswers");
  const answers = roomData.answers || {};
  el.innerHTML = Object.entries(answers).map(([name, ans]) =>
    '<div style="background:rgba(255,255,255,0.03);border-radius:6px;padding:8px;margin-bottom:6px;font-size:12px"><strong>' + name + '</strong>: ' + ans.text.slice(0,60) + '...</div>'
  ).join('') || '<p style="color:var(--muted);font-size:12px">Waiting for answers...</p>';
}

async function showScores() {
  roomData = loadRoom(roomCode);
  roomData.state = "scoring";
  saveRoom(roomData);
  document.getElementById("hostScoreDisplay").style.display = "";
  document.getElementById("hostScores").innerHTML = '<div class="status status-info"><span class="spinner"></span>AI is scoring all answers...</div>';
  document.getElementById("showScoresBtn").style.display = "none";

  const q = roomData.questions[currentQIndex];
  const answers = roomData.answers || {};

  if (!Object.keys(answers).length) {
    document.getElementById("hostScores").innerHTML = '<p style="color:var(--muted);font-size:13px">No answers submitted.</p>';
    document.getElementById("nextQBtn").style.display = "";
    document.getElementById("startRoundBtn").style.display = "";
    return;
  }

  try {
    const answerList = Object.entries(answers).map(([name, a]) => name + ": " + a.text).join("\n");
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are a blockchain quiz judge. Score each answer from 0-100.

REFERENCE DOCS / CONTEXT:
${roomData.context || "General blockchain knowledge"}

QUESTION: ${q.q}
${q.modelAnswer ? "MODEL ANSWER: " + q.modelAnswer : ""}

PLAYER ANSWERS:
${answerList}

Reply with JSON only, no markdown:
{"scores": [{"name": "player name", "score": 0-100, "feedback": "one sentence"}]}`
        }]
      })
    });
    const data = await response.json();
    const text = data.content[0].text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(text);

    // Save scores to room
    result.scores.forEach(s => {
      if (roomData.players[s.name] !== undefined) {
        roomData.players[s.name] = (roomData.players[s.name] || 0) + s.score;
      }
      if (roomData.answers[s.name]) {
        roomData.answers[s.name].score = s.score;
        roomData.answers[s.name].feedback = s.feedback;
      }
    });
    roomData.state = "scored";
    saveRoom(roomData);

    // Display scores
    const sorted = result.scores.sort((a,b) => b.score - a.score);
    const medals = ["🥇","🥈","🥉"];
    document.getElementById("hostScores").innerHTML = sorted.map((s,i) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <span>${medals[i] || "#"+(i+1)}</span>
          <div>
            <div style="font-weight:600;font-size:13px">${s.name}</div>
            <div style="font-size:11px;color:var(--muted)">${s.feedback}</div>
          </div>
        </div>
        <div style="font-size:16px;font-weight:700;color:var(--purple-light)">${s.score}/100</div>
      </div>
    `).join('');

    const hasMore = currentQIndex < roomData.questions.length - 1;
    document.getElementById("nextQBtn").style.display = hasMore ? "" : "none";
    document.getElementById("startRoundBtn").style.display = hasMore ? "" : "none";
    if (!hasMore) {
      document.getElementById("hostGameStatus").textContent = "Quiz complete! All questions done.";
      roomData.state = "finished";
      saveRoom(roomData);
    }
  } catch(e) {
    document.getElementById("hostScores").innerHTML = '<div class="status status-error">Scoring error: ' + e.message + '</div>';
    document.getElementById("nextQBtn").style.display = "";
  }
}

function nextQuestion() {
  document.getElementById("nextQBtn").style.display = "none";
  document.getElementById("hostScoreDisplay").style.display = "none";
  document.getElementById("startRoundBtn").style.display = "";
  document.getElementById("hostGameStatus").textContent = "Ready for next question";
}

function endQuiz() {
  clearInterval(hostInterval);
  if (roomCode) {
    const rd = loadRoom(roomCode);
    if (rd) { rd.state = "finished"; saveRoom(rd); }
  }
  selectRole(null);
}

// ── PLAYER ────────────────────────────────────────────────────────────────
function joinRoom() {
  playerName = document.getElementById("pName").value.trim();
  const code = document.getElementById("pRoomCode").value.trim().toUpperCase();
  if (!playerName || !code) { alert("Enter your name and room code!"); return; }
  const room = loadRoom(code);
  if (!room) {
    document.getElementById("joinStatus").innerHTML = '<div class="status status-error">Room not found. Check the code!</div>';
    return;
  }
  roomCode = code;
  room.players[playerName] = 0;
  saveRoom(room);
  playerScore = 0;
  document.getElementById("pQuizTitle").textContent = room.title;
  document.getElementById("waitRoomInfo").textContent = "Room: " + room.code + " — " + room.title;
  document.getElementById("playerJoinCard").style.display = "none";
  document.getElementById("playerWaitCard").style.display = "";

  // Poll for game state
  let lastQ = -1;
  playerInterval = setInterval(() => {
    const r = loadRoom(roomCode);
    if (!r) return;
    const count = Object.keys(r.players).length;
    document.getElementById("playerCount").textContent = count + " player" + (count !== 1 ? "s" : "") + " in room";

    if (r.state === "question" && r.currentQ !== lastQ) {
      lastQ = r.currentQ;
      hasAnswered = false;
      showPlayerQuestion(r);
    } else if ((r.state === "scored" || r.state === "scoring") && !hasAnswered) {
      // show waiting
    } else if (r.state === "scored") {
      showPlayerScores(r);
    } else if (r.state === "finished") {
      clearInterval(playerInterval);
      showPlayerScores(r);
      document.getElementById("nextQNotice").textContent = "Quiz finished! Thanks for playing 🎉";
    }
  }, 1500);
}

function showPlayerQuestion(room) {
  clearInterval(playerTimerInterval);
  document.getElementById("playerWaitCard").style.display = "none";
  document.getElementById("playerScoreCard").style.display = "none";
  document.getElementById("playerAnswerCard").style.display = "";
  document.getElementById("playerScoreCard").style.display = "none";

  const q = room.questions[room.currentQ];
  document.getElementById("pQuestion").textContent = q.q;
  document.getElementById("pQNum").textContent = room.currentQ + 1;
  document.getElementById("pAnswer").value = "";
  document.getElementById("pAnswer").disabled = false;
  document.getElementById("pSubmitBtn").disabled = false;
  document.getElementById("pFeedback").innerHTML = "";

  timerSeconds = room.timer || 30;
  document.getElementById("pTimer").textContent = timerSeconds;
  document.getElementById("pProgressFill").style.transition = "none";
  document.getElementById("pProgressFill").style.width = "100%";
  setTimeout(() => {
    document.getElementById("pProgressFill").style.transition = "width " + timerSeconds + "s linear";
    document.getElementById("pProgressFill").style.width = "0%";
  }, 100);

  playerTimerInterval = setInterval(() => {
    timerSeconds--;
    document.getElementById("pTimer").textContent = timerSeconds;
    if (timerSeconds <= 0) {
      clearInterval(playerTimerInterval);
      if (!hasAnswered) autoPlayerSubmit();
    }
  }, 1000);
}

function submitPlayerAnswer() {
  if (hasAnswered) return;
  const answer = document.getElementById("pAnswer").value.trim();
  if (!answer) { autoPlayerSubmit(); return; }
  clearInterval(playerTimerInterval);
  hasAnswered = true;
  document.getElementById("pAnswer").disabled = true;
  document.getElementById("pSubmitBtn").disabled = true;

  const room = loadRoom(roomCode);
  if (room) {
    room.answers = room.answers || {};
    room.answers[playerName] = { text: answer, time: Date.now() };
    saveRoom(room);
  }
  document.getElementById("pFeedback").innerHTML = '<div class="status status-success">✓ Answer submitted! Waiting for host to reveal scores...</div>';
}

function autoPlayerSubmit() {
  if (hasAnswered) return;
  hasAnswered = true;
  document.getElementById("pAnswer").disabled = true;
  document.getElementById("pSubmitBtn").disabled = true;
  document.getElementById("pFeedback").innerHTML = '<div class="status status-warning">⏰ Time's up! No answer submitted.</div>';
}

function showPlayerScores(room) {
  document.getElementById("playerAnswerCard").style.display = "none";
  document.getElementById("playerScoreCard").style.display = "";

  const players = room.players || {};
  const sorted = Object.entries(players).sort((a,b) => b[1]-a[1]);
  const medals = ["🥇","🥈","🥉"];

  const myAnswer = room.answers?.[playerName];
  let myScoreHtml = "";
  if (myAnswer?.score !== undefined) {
    playerScore = players[playerName] || 0;
    document.getElementById("pScore").textContent = playerScore;
    myScoreHtml = `<div class="status status-info" style="margin-bottom:16px">
      Your score this round: <strong>${myAnswer.score}/100</strong> — ${myAnswer.feedback || ""}
    </div>`;
  }

  document.getElementById("playerLeaderboard").innerHTML = myScoreHtml + sorted.map(([name, score], i) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:${name===playerName?'rgba(124,58,237,0.1)':'rgba(255,255,255,0.02)'};border:1px solid ${name===playerName?'rgba(124,58,237,0.4)':'var(--border)'};border-radius:8px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px">
        <span>${medals[i] || "#"+(i+1)}</span>
        <span style="font-weight:${name===playerName?700:400};font-size:14px">${name}${name===playerName?' (you)':''}</span>
      </div>
      <span style="font-weight:700;color:var(--purple-light)">${score} pts</span>
    </div>
  `).join('');
}

</script>
</body>
</html>
